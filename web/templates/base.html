<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seed Money{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">Seed Money</a>
        <span class="nav-tagline">March Madness Bracket Optimizer</span>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Seed Money &mdash; Beat your pool with math, not luck.</p>
        <p class="support-link">
            <a href="https://buymeacoffee.com/shane.connelly" target="_blank" rel="noopener noreferrer">Buy Me a Coffee</a>
        </p>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
